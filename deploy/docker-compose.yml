# Rex central node — base compose file.
#
# Three services:
#
#   rex-central   the binary (this repo, deploy/Dockerfile)
#   postgres      durable event store (central-node.DB.*)
#   caddy         OPTIONAL TLS reverse proxy (central-node.SEC.1).
#                 Runs only when `--profile tls` is passed to
#                 `docker compose up`. Without it, rex-central
#                 listens on 127.0.0.1:8080 and operators are
#                 expected to put their own TLS terminator in
#                 front (k8s ingress, fly.io edge, etc.).
#
# overview.ENG.1 forbids runtime services beyond Postgres for
# the binary itself — the binary doesn't talk to Caddy
# programmatically; Caddy talks to it. Putting Caddy behind a
# profile keeps that boundary explicit.
#
# Single-command setup:
#
#   docker compose -f deploy/docker-compose.yml up -d
#
# With TLS:
#
#   docker compose -f deploy/docker-compose.yml --profile tls up -d
#
# Local dev (live-reload-friendly settings, in-memory store
# unless overridden):
#
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.dev.yml up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rex
      POSTGRES_USER: rex
      # POSTGRES_PASSWORD comes from .env; never commit a default
      # password to a repo.
      POSTGRES_PASSWORD: ${REX_PG_PASSWORD:?REX_PG_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rex -d rex"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No host port published in the base file: Postgres is only
    # reachable inside the compose network. The dev override
    # publishes :55432 for poking around with psql from the host.

  rex-central:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DSN is built from the postgres service's env so secrets
      # stay in .env — DEPLOY.2's "env vars hold secrets" rule.
      REX_CENTRAL_DB_DSN: postgres://rex:${REX_PG_PASSWORD}@postgres:5432/rex?sslmode=disable
      # Bind on all interfaces so Caddy (or any other proxy) can
      # reach the binary from a sibling container.
      REX_CENTRAL_ADDR: 0.0.0.0:8080
    volumes:
      # central.toml holds non-secret defaults (DEPLOY.2). Bind
      # the operator's copy at the canonical /etc/rex path; the
      # binary defaults to looking there.
      - ./central.toml:/etc/rex/central.toml:ro
      # rex-state holds the binary's snapshots, hook logs, and
      # any other on-disk state independent of Postgres
      # (DEPLOY.3). Named volume so docker compose down doesn't
      # delete it.
      - rex-state:/var/lib/rex
    expose:
      - "8080"
    healthcheck:
      # /health is the liveness probe (HEALTH.1); /ready is the
      # readiness probe — but distroless has no curl/wget, so we
      # fall back to the binary's own HTTP probe via the
      # docker-compose service_healthy gate. The CMD form runs
      # rex-central with `--version` which exits 0 when the
      # binary is alive; the health endpoint is what k8s and
      # external monitors hit.
      test: ["CMD", "/usr/local/bin/rex-central", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    restart: unless-stopped
    depends_on:
      - rex-central
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  rex-state:
  caddy-data:
  caddy-config:
