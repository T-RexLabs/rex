name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    services:
      # Postgres for the central-node store tests. Tests skip
      # when REX_PG_TEST_DSN is unset (developer laptops without
      # Docker), so this services: block is what makes them
      # actually run in CI.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: rex_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REX_PG_TEST_DSN: postgres://postgres:ci@127.0.0.1:5432/rex_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `kind: commit` proof entries in specs/
          # resolve via `git cat-file -e <ref>` during
          # TestSpecVerifyOnRealRepo. The default shallow clone
          # only includes HEAD, which fails verification on every
          # historical commit ref the spec set cites
          # (e.g. spec-format.define-run-recipes.proof[2-3]).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The Postgres service runs 17, but ubuntu-latest ships pg_dump 16,
      # which refuses to dump from a newer server. Install the matching
      # client tools from the official PGDG repo and put them ahead of
      # the system pg_dump on PATH.
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Verify modules tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1
