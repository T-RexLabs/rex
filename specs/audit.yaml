spec_version: 1

metadata:
  id: audit
  name: Audit log
  state: draft
  created_at: 2026-05-03T00:00:00Z
  updated_at: 2026-05-03T00:00:00Z

description: |
  The audit log is the durable record of who did what and when, intended
  to be the answer to security, compliance, and "wait, what happened?"
  questions. It is append-only and immutable as a real, enforced invariant
  — central nodes refuse to mutate audit rows, even from admin identities.

  Retention is forever by default. A separate compaction knob may compact
  *transcript content* older than a threshold to a hash + summary, but
  audit metadata about transcripts is never compacted away.

  The audit log is one of the entities in the event-sourced sync category;
  it ships from local to central as part of normal sync. The central node
  is the durable archive; locals may garbage-collect old audit entries
  after they're confirmed durable on a remote.

tasks:
  - id: audit-event-types
    description: "Enumerate and document every event type that becomes an audit entry"
    state: todo
    references: [TYPES.1, TYPES.2]

  - id: audit-storage
    description: "Implement the audit-log storage layer with structural append-only enforcement"
    state: todo
    references: [STORE.1, STORE.2, STORE.3]

  - id: audit-query
    description: "Implement audit-log queries (`rex log tail`, `rex log search`) and the structured-filter language"
    state: todo
    references: [QUERY.1, QUERY.2, QUERY.3]

  - id: compaction-job
    description: "Implement the transcript-compaction scheduled job for central nodes"
    state: todo
