spec_version: 1

metadata:
  id: spec-format
  name: Rex spec YAML format
  state: draft
  created_at: 2026-05-03T00:00:00Z
  updated_at: 2026-05-06T00:00:00Z

description: |
  The YAML format used by every spec in a Rex workspace, including this one.
  Specs play three simultaneous roles in Rex: a task list (the work to do),
  a contract (the acceptance criteria), and a template (the structure other
  specs can extend). The format must support all three without becoming a
  kitchen sink, and must stay lean enough that 80% of users never customize it.

  Inspired by acai's `feature.yaml`, but lighter: components grouping
  requirements, stable numbered IDs (ACIDs), separate constraints block,
  state markers — without adopting the one-spec-per-feature opinion or
  excluding design content.

tasks:
  - id: define-go-types
    description: Define the Go structs that mirror this schema, with `yaml` tags and validation tags
    state: done
    references: [CORE.1, CORE.2, META.1, COMP.1, REQ.1]

  - id: implement-validator
    description: Implement `rex spec validate`, including required-field checks, ACID format checks, and template-extension validation
    state: done
    references: [VAL.1, VAL.2, VAL.3, VAL.4]

  - id: implement-templates
    description: 'Implement workspace-level and org-level template extension; templates are themselves specs with `template: true` in extra'
    state: done
    references: [TMPL.1, TMPL.2, TMPL.3]

  - id: implement-acid-resolver
    description: Implement an ACID resolver that validates references across specs in a workspace and reports dangling refs
    state: done
    references: [REQ.3, ACID.1, ACID.2]

  - id: write-three-real-specs
    description: Write three real specs against this format before locking the v1 schema; revise the schema based on what's missing
    state: done
    references: [CORE.1]

  - id: define-run-recipes
    description: |
      Implement run recipes: extend the Go types under
      internal/core/specfmt/, add validator support for the
      RECIPE schema and PROMPT.1 templating, wire
      `rex run start --from-task` in the CLI, and add the
      web UI run-button affordance to /specs/<id>.
    state: todo
    references: [TASK.6, TASK.6.1, RECIPE.1, RECIPE.2, RECIPE.3, RECIPE.4, RECIPE.5, PROMPT.1, TMPL.2.1]

components:

  CORE:
    name: Top-level document shape
    requirements:
      "1": 'A spec document is a YAML mapping with a top-level `spec_version` integer; v1 documents have `spec_version: 1`'
      "2": The recognized top-level keys are `spec_version`, `metadata`, `description`, `tasks`, `components`, `constraints`, and `extra`; only `spec_version` and `metadata` are required
      "3": Unknown top-level keys are a validation error in strict mode and a warning in lenient mode; this prevents typo'd extension keys from being silently dropped
      "4": A spec is valid with just `spec_version`, `metadata.id`, `metadata.name`, and `metadata.state` set

  META:
    name: Metadata block
    requirements:
      "1": "`metadata.id` is a kebab-case slug, stable forever, used as the prefix in ACID references"
      "1.1": Once published to a remote, a spec's `metadata.id` is immutable; renames create a new spec with `replaced_by` set on the old one
      "2": "`metadata.name` is a human-readable title; no format constraints"
      "3": "`metadata.state` is one of: draft, active, accepted, archived"
      "3.1": "draft = author is still working on it; active = open for work; accepted = closed-as-shipped; archived = closed-as-abandoned-or-superseded"
      "4": "`metadata.created_at` and `metadata.updated_at` are ISO-8601 timestamps; the validator updates `updated_at` on save"
      "5": Metadata blocks may include workspace-template-defined required fields beyond the global ones; the validator runs the workspace template after the global v1 schema

  DESC:
    name: Description
    requirements:
      "1": "`description` is an optional free-form Markdown string; renderers may format it"

  TASK:
    name: Tasks block
    requirements:
      "1": "`tasks` is an optional list of task objects, each representing a unit of implementation work the spec embeds"
      "2": Each task has an `id` (kebab-case, unique within the spec), a `description`, and a `state` (todo, in_progress, done, blocked)
      "3": Tasks may have a `references` list of ACID strings indicating which requirements they fulfill
      "3.1": References inside `tasks[].references` may use either fully-qualified ACIDs or the short form defined in `spec-format.ACID.1.1`; mixing the two forms in the same list is permitted
      "4": Tasks may have an optional `assigned_to` user handle
      "5": Tasks live alongside acceptance criteria in the same document because in Rex a spec is simultaneously a task list and a contract
      "6": |
        A task may carry an optional `run` field whose shape is
        defined by the `RECIPE` component. The field is a single
        recipe object, not a list — a task represents one unit of
        work and has at most one canonical way to launch it.
        Multi-step workflows are out of scope for v1 recipes.
      "6.1": |
        A recipe is a hint, not a guarantee. The validator confirms
        the recipe is well-formed (RECIPE schema), but does not
        attempt to execute it. A recipe whose `kind` references a
        primitive the local executor does not know about is an
        error in strict mode and a warning in lenient mode,
        matching the strict-vs-lenient split in `VAL.2`. This
        keeps typos like `kind: harnes` from passing the default
        `rex spec validate` invocation, while still letting read
        paths under schema drift continue working.

  COMP:
    name: Components block
    requirements:
      "1": "`components` is an optional mapping from uppercase component IDs (e.g. AUTH, RUN) to component objects"
      "1.1": "Component IDs use uppercase ASCII letters, optionally joined by hyphens (e.g. `AUTH`, `RUN`, `EXEC-SCOPE`); no lowercase letters, digits, or other characters are permitted in a component ID; the same rule applies to constraint group IDs"
      "2": A component object has a `name` and a `requirements` mapping
      "3": Component IDs are immutable once published; renumbering or renaming forbidden

  REQ:
    name: Requirements within components
    requirements:
      "1": A `requirements` mapping has string keys (numeric IDs like `1`, `1.1`, `2-note`) and string values (the requirement text)
      "1.1": Numeric keys must be quoted in YAML so they remain strings
      "2": 'Requirement IDs are immutable; deletion is forbidden, retire via `deprecated: true`'
      "3": 'A requirement may be replaced by another via `replaced_by: <ACID>`'
      "4": A requirement value may be either a plain string or a mapping with `text`, `deprecated`, `replaced_by`, and `notes` keys

  ACID:
    name: Stable requirement references (ACIDs)
    requirements:
      "1": "An ACID has the form `<spec.id>.<COMPONENT>.<requirement-id>`, e.g. `auth-flow.AUTH.1.1`"
      "1.1": "Within the body of a spec, references to that spec's own requirements MAY omit the `<spec.id>.` prefix and use the short form `<COMPONENT>.<requirement-id>`; the validator resolves the prefix from the enclosing `metadata.id`. Cross-spec references MUST use the fully-qualified form."
      "2": ACIDs are stable across renames of surrounding text and are the canonical referenceability primitive across the system
      "3": Tools, transcripts, commits, and audit entries may all cite ACIDs; the validator and search index both understand them

  CONST:
    name: Constraints block
    requirements:
      "1": "`constraints` is an optional mapping with the same shape as `components` but for cross-cutting invariants (engineering, security, performance)"
      "2": Constraints are referenced via the same ACID format as requirements; component IDs in `constraints` and `components` must not collide
      "3": Each constraint object has a `description` field (a free-form string explaining the rule's scope) and a `requirements` mapping. The outer shape mirrors a component object except that constraint objects use `description` where component objects use `name`; both fields are required by their respective objects, and Markdown is permitted in both

  EXTRA:
    name: Extra block
    requirements:
      "1": "`extra` is an optional mapping for project-defined fields"
      "2": Common conventional keys include `owners` (list of handles), `related_specs` (list of spec IDs), `notes` (free-form Markdown string for trailing prose), and `template` (boolean marking a template spec)
      "3": Workspace and org templates may declare additional required `extra` keys

  TMPL:
    name: Template extensibility
    requirements:
      "1": 'A workspace template is itself a spec with `extra.template: true` and `extra.applies_to` indicating its scope'
      "2": Templates can pre-declare required `metadata` fields, required `components` keys, and required `extra` fields that all specs in the workspace must satisfy
      "2.1": |
        A workspace template may declare a
        `extra.recipes_required: true` flag (every actionable task
        must carry a `run` recipe; the template defines what
        "actionable" means via a list of task states the rule
        applies to) or `extra.recipes_forbidden: true` (no task may
        carry a recipe). The two flags are mutually exclusive. The
        validator runs the appropriate check in the second pass per
        `TMPL.3`.
      "3": Validation runs in two passes — global v1 schema first, then the active workspace template
      "4": 'A spec may declare `extra.template_id: <id>` to opt into a specific template; otherwise the workspace default template applies'

  RECIPE:
    name: Run recipe shape
    requirements:
      "1": |
        A recipe is a YAML mapping with a required `kind` field and
        kind-specific argument fields. Recognized v1 kinds are
        `shell`, `spec_validate`, and `harness`. Unknown kinds are
        an error in strict mode and a warning in lenient mode (per
        `TASK.6.1`).
      "2": |
        `kind: shell` recipes have a required `command` field (a
        non-empty list of strings, executed without an intermediate
        shell — argv[0] is the program, argv[1:] are the arguments).
        String commands are not accepted; authors that need a shell
        write `["bash", "-lc", "..."]` explicitly. This avoids
        shell-quoting footguns and keeps the executor's primshell
        invocation deterministic. The recipe may include `cwd` (path
        relative to the workspace root) and `env` (mapping of name
        to value). Each list element is run through `PROMPT.1`
        substitution before execution.
      "3": |
        `kind: spec_validate` recipes have an optional `paths` field
        (list of glob patterns relative to the workspace root); when
        omitted, the recipe targets `specs/*.yaml`. They may include
        a `strict` boolean (defaults to true, matching `rex spec
        validate`'s default mode).
      "4": |
        `kind: harness` recipes have a required `harness` field (the
        harness handle, e.g. `claude-code`, `codex`, `opencode`,
        `copilot`, `cursor`) and a required `prompt` field (string
        or template — see `PROMPT.1`). They may include
        `permission_scope`, a hint to the executor about how
        aggressively to auto-approve permission requests during the
        session. The v1 enumerated values are:

          `read_only`     — auto-deny anything that mutates state;
                            pass read-style requests to the human
                            prompt as today
          `workspace`     — auto-approve requests scoped within the
                            workspace root; everything else still
                            prompts (the default when omitted)
          `unrestricted`  — pass every request to the human prompt
                            without auto-policy; useful for
                            exploratory recipes

        This vocabulary is recipe-format-only. The executor's
        existing PermissionRequested/Granted/Denied flow remains
        authoritative for individual decisions; the scope is a
        policy hint, not an override.
      "5": |
        A recipe may include an optional `description` (string,
        free-form) that surfaces in the UI alongside the run button
        and in `--from-task` dry-run output. When omitted, the
        enclosing task's description is shown.

  PROMPT:
    name: Recipe prompt-template substitution
    requirements:
      "1": |
        Harness `prompt` strings and shell `command` strings may
        embed the following substitution tokens, evaluated at
        recipe-resolution time (CLI invocation or web-UI prefill):

          {{spec.id}}              — the enclosing spec's metadata.id
          {{spec.name}}            — the enclosing spec's metadata.name
          {{task.id}}              — the enclosing task's id
          {{task.description}}     — the enclosing task's description
          {{task.references}}      — the task's references list,
                                     comma-joined as fully-qualified
                                     ACIDs

        Unknown tokens are an error in strict validation mode and a
        warning in lenient mode (matching the unknown-kind handling
        in `TASK.6.1`). Templating is a recipe-resolution-time
        concern; the YAML on disk stores the raw template string.

  VAL:
    name: Validation behavior (the `rex spec validate` contract)
    requirements:
      "1": Validation reports each error with the spec file, the YAML path, the error category, and a human-readable message
      "2": Validation has strict and lenient modes; strict is the default for `rex spec validate`, lenient is the default for read paths that need to keep working under schema drift
      "3": Validation includes ACID resolution — every cited ACID must point to an existing requirement in the workspace's known specs, or be flagged as dangling
      "4": Validation is idempotent and side-effect-free; it never modifies the spec file
      "5": Exit code is 0 on success, 1 on any error, 2 on internal validator failure

constraints:

  COMPAT:
    description: Forward-compatibility invariants
    requirements:
      "1": v1 spec format is frozen once published — no removal of recognized keys, no semantic changes to existing fields
      "2": 'Future spec format versions (`spec_version: 2`) require a separate parser; readers refuse to interpret a higher version than they were built against, with a clear error'
      "3": Adding new optional top-level keys is a minor schema change requiring a parser revision; old parsers warn but continue when given a forward-compatible document

extra:
  owners: []
  related_specs: [overview, workspace]
  notes: |
    This spec describes itself. The format defined here is the format
    used by every other spec in this directory. Validating this file
    against the format it defines is a useful smoke test.
