spec_version: 1

metadata:
  id: web-ui
  name: Web UIs (local + central)
  state: draft
  owners: []
  related_specs: [overview, cli, execution, search, audit, central-node, sync]
  created_at: 2026-05-03T00:00:00Z
  updated_at: 2026-05-16T00:00:00Z

description: |
  Rex ships two web UIs from day one: a local UI served by the local
  binary, and a central UI served by central nodes. They share components
  where possible. The local UI is a strict subset of the central UI —
  no org management, no member/role admin, no SSO/IdP surfaces.

  The technology is htmx + server-rendered HTML, with `hx-ext="sse"` for
  the streaming bits (run progress, transcript live updates) and regular
  htmx swaps for everything else. There is no SPA framework. Both UIs
  talk to the same REST/SSE backend that the CLI talks to — no surface
  has privileged backdoors.

  The CLI is the polish-first surface for v1. The web UI must be
  functional on day one but it is a secondary view onto the same model;
  visual polish is allowed to lag the CLI.

tasks:
  - id: server-side-html
    description: "Set up the Go HTML template engine, base layout, and the htmx + SSE wiring"
    state: done
    references: [STACK.1, STACK.2, STACK.3]
    proof:
      - kind: code
        path: internal/local/web/

  - id: shared-component-lib
    description: "Build the small set of shared components used in both UIs (cards, tables, run-transcript, ACID badge, draft indicator)"
    state: done
    note: "Seven partials shipped under templates/partials/ (workspace_card, spec_row, run_row, audit_row, acid_badge, draft_indicator, scope_picker). loadPages parses every partial alongside base.tmpl + each page so any caller can {{template ...}} them without enumeration. Page templates refactored to use spec_row/run_row/audit_row partials. The draft_indicator wires the sync.DRAFT.2 NeedsRebase + LastConflictHead signals through remoteRow / remoteDetailRow's IndicatorView() — both colour AND text labels carry state per ACCESS.2. The scope_picker is wired into the global topbar search; remote options come from the registered remotes.toml. Run-transcript is the one component still inlined on /runs/<id> — it is heavy enough that lifting it would split frame_view.go's rendering helpers; deferred until central-ui-routes needs it. SHARED.2's identical-rendering invariant is structural: every partial uses no local-only data, only fields that render the same in either UI."
    references: [SHARED.1, SHARED.2]
    proof:
      - kind: code
        path: internal/web/templates/partials/
      - kind: code
        path: internal/local/web/server.go
      - kind: code
        path: internal/local/web/data.go
      - kind: code
        path: internal/local/web/remotes.go
      - kind: test
        path: internal/local/web/partials_test.go

  - id: local-ui-routes
    description: "Implement the local UI route set: workspaces, specs, runs, audit, remotes, settings"
    state: done
    note: "All six routes ship per the (amended-2026-05-08) flat shape — LOCAL.1.1 captures the v1 single-workspace binding rationale; the original /workspaces/<id>/... prefix is post-v1."
    references: [LOCAL.1, LOCAL.2, LOCAL.3, LOCAL.4, LOCAL.5, LOCAL.6]
    proof:
      - kind: code
        path: internal/local/web/handlers.go
      - kind: code
        path: internal/web/templates/

  - id: web-package-split
    description: "Move shared web code from internal/local/web/ to internal/web/; add a WorkspaceResolver interface; keep internal/local/web/ as the local binary's thin shell. No behaviour change for the local UI"
    state: done
    note: "Templates, static assets, render machinery, the FuncMap, the Highlighter, and the WorkspaceResolver interface live at internal/web/ (CENTRAL-LAYOUT.1). internal/local/web/ keeps its handlers and workspace-bound state (CENTRAL-LAYOUT.3); Server now holds an *internalweb.Renderer + *internalweb.Highlighter and provides a single-workspace localResolver implementing internalweb.WorkspaceResolver (CENTRAL-LAYOUT.2). Render delegation goes through Server.render → Renderer.Render so every existing handler call site stays unchanged. No template body, FuncMap entry, or page contract changed; the partials test now drives the shared renderer directly via NewRenderer()/Page() (SHARED.2 invariant preserved)."
    references: [CENTRAL-LAYOUT.1, CENTRAL-LAYOUT.2, CENTRAL-LAYOUT.3, SHARED.2]
    proof:
      - kind: code
        path: internal/web/
      - kind: code
        path: internal/web/resolver.go
      - kind: code
        path: internal/web/renderer.go
      - kind: code
        path: internal/local/web/server.go
      - kind: test
        path: internal/local/web/partials_test.go

  - id: central-web-shell
    description: "Stand up internal/central/web/ and wire it into cmd/rex-central serve behind a --web flag (off by default until the read-side pages land). Empty surface with a single /health ping page proving the wiring"
    state: done
    note: "internal/central/web is a tiny shell: New() builds an internal/web.Renderer (proves the shared package is reachable from the central binary), mounts /static/ from internal/web.StaticFS, and serves an HTML wiring-proof page at /_web/health. cmd/rex-central serve grew a --web flag (default off); when set, the shell is constructed and installed on the central server's mux via the new Server.MountWeb(h http.Handler). MountWeb registers h at \"/\" — http.ServeMux's longest-match rule keeps the existing API routes (/sync/*, /auth/*, /admin/*, /health, /ready, /metrics) authoritative, so the web fallback never silently swallows API requests (covered by TestMountWebFallbackDoesNotShadowAPI). The wiring-proof endpoint is intentionally /_web/health rather than /health so the JSON liveness probe stays the central-node.HEALTH.1 surface; the placeholder URL is replaced by the real route set in central-read-side-pages."
    references: [CENTRAL-LAYOUT.1, STACK.1, STACK.2]
    proof:
      - kind: code
        path: internal/central/web/server.go
      - kind: code
        path: cmd/rex-central/main.go
      - kind: code
        path: internal/central/server/server.go
      - kind: test
        path: internal/central/web/server_test.go
      - kind: test
        path: internal/central/server/server_test.go

  - id: central-browser-auth
    description: "Implement the browser session: /login, /auth/redeem, the rex_session cookie, the cookie-or-bearer middleware, and logout. Add the rex remote login --challenge <s> CLI subcommand that signs the challenge"
    state: done
    note: "Browser session is bound by an HttpOnly + Secure + SameSite=Strict rex_session cookie carrying the existing identity-and-trust.TOKEN.* access token (CENTRAL-AUTH.1, .5). New surfaces on the central API server: /auth/redeem (GET; validates token, sets cookie, 303s to ?redirect=<path>) and /auth/logout (POST; revokes token + clears cookie); requireToken now reads the rex_session cookie when no Authorization header is present so cookie-bound and bearer-bound requests share the same auth path (CENTRAL-AUTH.3, .4). The web shell's /login handler issues a challenge via Auth.IssueLoginChallenge, stamps the post-login redirect from ?redirect=, and renders an inline HTML page that embeds a base64 LoginChallengePackage (proto.LoginChallengePackage holding {challenge_id, nonce, hostname, expires_at, redirect}). The new CLI subcommand `rex remote login <name> [--challenge <s>] [--redirect <p>] [--print-url]` decodes that package, signs the canonical input with the local keypair, POSTs /auth/verify, and assembles `<central>/auth/redeem?token=<...>&redirect=<...>` which it opens in the browser by default (xdg-open / open / rundll32) or prints under --print-url (CENTRAL-AUTH.2). When --challenge is omitted the CLI does its own /auth/challenge handshake and lands at \"/\". Open-redirect hardened on both sides — /auth/redeem rejects anything that doesn't pass isSafeRedirect, and the CLI rejects external --redirect overrides locally before any HTTP call. Browser never holds the private key; the CLI signs and the browser only sees the resulting cookie."
    references: [CENTRAL-AUTH.1, CENTRAL-AUTH.2, CENTRAL-AUTH.3, CENTRAL-AUTH.4, CENTRAL-AUTH.5]
    proof:
      - kind: code
        path: internal/central/server/session.go
      - kind: code
        path: internal/central/web/server.go
      - kind: code
        path: internal/local/cli/remote_login.go
      - kind: code
        path: internal/core/sync/proto/login.go
      - kind: test
        path: internal/central/server/session_test.go
      - kind: test
        path: internal/central/web/server_test.go
      - kind: test
        path: internal/local/cli/remote_login_test.go

  - id: central-resolver-bootstrap
    description: "Pin the WorkspaceResolver projection pattern by lifting /specs and /specs/<spec-id> into internal/web/ behind a SpecProjection interface. Local shell satisfies it by reading <Root>/.rex/specs/; central shell satisfies it by reading from the GitStore. Mount /orgs/<org-id>/workspaces/<ws-id>/specs and /orgs/<org-id>/workspaces/<ws-id>/specs/<spec-id> on the central web shell"
    state: done
    note: "SpecProjection + SpecRow + SpecView + SpecContent + LoadSpecContent live at internal/web/specs.go. internalweb.Workspace gained a Specs field; ScopePickerData lifted from internal/local/web/ to internal/web/ (re-exported as type aliases in the local package so existing handler code stays unchanged). Local shell now hosts localSpecProjection (reads <Root>/.rex/specs/) and composes the shared SpecContent with its local-only amendments + runs-by-task extras. Central shell hosts centralSpecProjection (reads `specs/*.yaml` from a GitEntityReader, skipping `specs/_proposed/...`) and a centralWorkspaceResolver bound by NewGitStoreResolver from cmd/rex-central. Routes `/orgs/{org}/workspaces/{ws}/specs` + `/orgs/{org}/workspaces/{ws}/specs/{id}` mount on the central web shell; /static/chroma.css joins the static surface so spec_detail.tmpl's source tab styles consistently across shells (SHARED.2). v1 limitation surfaced in code + tests: the central GitStore is currently single-workspace (no workspace_id column), so centralWorkspaceResolver returns the same projection for every workspaceID until the multi-workspace GitStore refactor lands; the URL shape is forward-compatible. central-side spec extras (Amendments, RunsByTask, UntaskedRuns, AllRuns, RunCount, Harnesses) are present-as-empty placeholders on centralSpecDetailData so the shared spec_detail.tmpl renders without errors; each gets a real projection in its own follow-up sub-task."
    references: [CENTRAL.1, CENTRAL-LAYOUT.2, SHARED.2]
    proof:
      - kind: code
        path: internal/web/specs.go
      - kind: code
        path: internal/web/resolver.go
      - kind: code
        path: internal/central/web/specs.go
      - kind: code
        path: internal/local/web/specs.go
      - kind: code
        path: cmd/rex-central/main.go
      - kind: test
        path: internal/central/web/specs_test.go

  - id: central-read-side-runs-audit
    description: "Lift /runs (list), /runs/<run-id> (terminal-state only — no live SSE; that's central-live-run-watching), and /audit handlers into internal/web/ behind a RunsProjection + AuditProjection. Central implementations read from the central event store (Postgres). The live-tail UI degrades to a banner on /runs/<run-id> for non-terminal runs"
    state: done
    note: "internal/web/runs.go owns the shared types (RunRow, RunDetail, RunEventBasic) + interfaces (RunsListProjection, RunDetailProjection) + pure fold helpers (FoldRecordsToRunRows, FoldRecordsToRunDetail, MatchesSpecFilter, isTerminalStatus). internal/web/audit.go owns AuditRow + AuditProjection + FilterRecordsToAuditRows + AuditDefaultLimit. internalweb.Workspace gained Runs / RunDetail / Audit fields. Local shell now goes through the shared fold via readEventsLog → FoldRecordsToRunRows / FilterRecordsToAuditRows; the rich frame-view + permission + SSE flow stays local-only on the existing /runs/<id> handler. runs_list.tmpl + audit.tmpl gained tiny shell-aware branches (CanStartRuns gate; Source label) so the same partials render correctly on central without the local-only affordances. Central shell mounts /orgs/{org}/workspaces/{ws}/runs (shared runs_list.tmpl), /orgs/{org}/workspaces/{ws}/runs/{id} (new central-only runs_central_detail.tmpl that renders the terminal-state header + raw event timeline; non-terminal runs surface a 'live tail not available on central in v1' banner per Decision B), and /orgs/{org}/workspaces/{ws}/audit (shared audit.tmpl). NewGitStoreResolver grew to take both a GitEntityReader and an EventReader; cmd/rex-central binds them from server.GitStore() + server.Store(). The renderer's FuncMap gained `pretty` for the central event timeline. v1 single-workspace limitation continues per central-resolver-bootstrap — the resolver ignores workspaceID until the multi-workspace store refactor lands."
    references: [CENTRAL.1, CENTRAL-LAYOUT.2, SHARED.2]
    proof:
      - kind: code
        path: internal/web/runs.go
      - kind: code
        path: internal/web/audit.go
      - kind: code
        path: internal/web/templates/pages/runs_central_detail.tmpl
      - kind: code
        path: internal/central/web/runs.go
      - kind: code
        path: internal/central/web/audit.go
      - kind: code
        path: internal/local/web/audit.go
      - kind: code
        path: cmd/rex-central/main.go
      - kind: test
        path: internal/central/web/runs_audit_test.go

  - id: central-read-side-search-amendments
    description: "Lift /search and /amendments + /amendments/<stem> into internal/web/ behind SearchProjection and AmendmentsProjection. Central search hits the Postgres FTS index (central-node.DB.4); amendments project from the GitStore"
    state: done
    note: "internal/web/amendments.go owns AmendmentRow, AmendmentDetail, AmendmentsListOptions, AmendmentsProjection, NewAmendmentRow, NewAmendmentDetail, FirstLineOf. internal/web/search.go owns SearchResultRow, SearchOptions, SearchProjection, MarkupSnippet, HrefForEntity. internalweb.Workspace gained Amendments + Search fields. specamend grew ParseAmendmentBytes (filesystem-agnostic parse) so the central side can project from raw GitStore bytes without writing a duplicate parser. Local shell now hosts localAmendmentsProjection (wraps specamend.List/Load) and localSearchProjection (wraps internal/core/search.Index); the existing local handlers (including accept/reject + saved-searches sidebar) keep their behaviour. Central shell hosts centralAmendmentsProjection (walks GitStore for specs/_proposed/[_accepted/]*.yaml, parses via specamend.ParseAmendmentBytes); mounts /orgs/{org}/workspaces/{ws}/amendments (shared amendments_list.tmpl) and /orgs/{org}/workspaces/{ws}/amendments/{stem} (shared amendments_detail.tmpl). The central detail page is read-only — the accept/reject buttons render as absent because central mutations are out of scope in v1 (identity signing + event-log writes are local-only); to make the gate visible to the template, central rewrites the state string for proposed amendments so the template's literal-state check fails. /orgs/{org}/workspaces/{ws}/search renders the shared search.tmpl with a new .Notice field carrying 'central search backend not yet wired in v1' until the Postgres FTS surface (central-node.DB.4) ships; the v1 central resolver leaves Workspace.Search nil. search.tmpl grew the .Notice banner branch (additive, no behaviour change on local). Saved-searches sidebar stays local-only — central declares zero-valued SaveSuccess/SaveError/Saved placeholders so the shared template guards short-circuit. v1 single-workspace limitation continues per central-resolver-bootstrap."
    references: [CENTRAL.1, CENTRAL-LAYOUT.2, SHARED.2]
    proof:
      - kind: code
        path: internal/web/amendments.go
      - kind: code
        path: internal/web/search.go
      - kind: code
        path: internal/core/specamend/specamend.go
      - kind: code
        path: internal/central/web/amendments.go
      - kind: code
        path: internal/central/web/search.go
      - kind: code
        path: internal/local/web/amendments.go
      - kind: code
        path: internal/local/web/search.go
      - kind: test
        path: internal/central/web/amendments_search_test.go

  - id: central-read-side-remotes-settings
    description: "Lift /remotes and /settings into internal/web/ as read-only on central per the 2026-05-16 amendment. Local shell continues to surface per-machine config (identity, log levels, hook search paths); the shared handler hides those sections when the resolver reports no per-machine context"
    state: done
    note: "internal/web/remotes.go owns RemoteRow + DraftIndicator + RemotesProjection plus IndicatorView(). internalweb.Workspace gained Remotes. remotes package grew ParseBytes (filesystem-agnostic TOML parse) so the central side projects from raw GitStore bytes without writing a temp file. Local shell now hosts localRemotesProjection (reads ~/.config/rex/remotes.toml + per-remote watermarks); the existing local /remotes handler behaviour is preserved. remotes.tmpl grew two data-driven affordances — .Source labels the registry origin and .AddCmd gates the 'add via …' hint — so the same template renders correctly on both shells. The local DraftIndicator type is now an alias of internalweb.DraftIndicator. Central shell hosts centralRemotesProjection (reads `remotes.toml` from the GitStore) and mounts /orgs/{org}/workspaces/{ws}/remotes (shared remotes.tmpl); per Decision C the page is read-only, so AddCmd is empty and the local-only sections (drafts watermark, last seen) render as em-dashes from the zero values. /settings on central uses a new central-only settings_central.tmpl rather than the shared local one — the local settings page bundles identity + hooks + log levels + remotes registry surfaces that have no central equivalent. Central renders just the workspace.yaml fields (id, name, state, created_at) + the raw synced YAML; identity / hooks / log-level sections are simply absent. The settings handler resolves the workspace via the resolver and reads workspace.yaml through a workspaceYAMLSource helper that lives on centralWorkspaceResolver. v1 single-workspace limitation continues — until the multi-workspace GitStore lands, the central reads the one workspace.yaml the store holds regardless of the URL ws-id."
    references: [CENTRAL.1, CENTRAL-LAYOUT.2, SHARED.2]
    proof:
      - kind: code
        path: internal/web/remotes.go
      - kind: code
        path: internal/web/templates/pages/settings_central.tmpl
      - kind: code
        path: internal/local/remotes/registry.go
      - kind: code
        path: internal/central/web/remotes.go
      - kind: code
        path: internal/central/web/settings.go
      - kind: code
        path: internal/local/web/remotes.go
      - kind: test
        path: internal/central/web/remotes_settings_test.go

  - id: central-workspaces-index
    description: "Implement /orgs/<org-id>/workspaces — the per-org workspace index page that lists every workspace the central knows about for the org, with a click-through to the workspace overview. Uses the existing workspaces table + tenant routing"
    state: done
    note: "internal/web/workspaces.go owns WorkspaceIndexRow + WorkspacesIndexProjection. A new workspaces_index.tmpl renders the per-org table with click-through to /orgs/<org>/workspaces/<ws-id>/specs. Central shell mounts /orgs/{org}/workspaces; centralWorkspacesIndexProjection reads the one workspace.yaml the GitStore holds and returns it as a single-row list, matching the v1 single-workspace GitStore limitation. When the multi-workspace GitStore refactor lands, the projection grows real dispatch against the workspaces table (central-node.DB.2 + the existing PostgresStore.WorkspaceOrg helper) without changing the handler call sites. The handler bypasses the standard ws-id route shape because /orgs/<id>/workspaces is org-scoped, not workspace-scoped — it dispatches through centralWorkspaceResolver's git field directly, returning 503 when a non-central resolver is bound."
    references: [CENTRAL.1]
    proof:
      - kind: code
        path: internal/web/workspaces.go
      - kind: code
        path: internal/web/templates/pages/workspaces_index.tmpl
      - kind: code
        path: internal/central/web/workspaces.go
      - kind: test
        path: internal/central/web/workspaces_test.go

  - id: central-live-run-watching
    description: "Implement live SSE on central's /orgs/<org-id>/workspaces/<ws-id>/runs/<run-id> plus inline permission-prompt POST handling. Gated: requires either central-side execution (v1.5 per overview.SCOPE.1) or a push-style protocol from a local executor to its synced central beyond the existing /sync/events terminal-event path. v1 ships with the terminal-state-only renderer from central-read-side-runs-audit and a 'live tail not available on central in v1' notice"
    state: todo
    note: "Deferred — depends on either central-side execution or a push channel for in-flight events."
    references: [CENTRAL.1, LIVE.1, LIVE.2, LIVE.3]

  - id: central-org-admin-pages
    description: "Implement the org-administration pages: /orgs/<id> (overview), /orgs/<id>/members (invite, role change, removal), /orgs/<id>/roles (role catalog view + edit). Every mutation runs through RBAC and writes audit entries (CENTRAL.3). Requires the org/member/role REST API to land first or alongside (tracked under central-node.RBAC-SVR.1)"
    state: done
    note: "Ships the READ side of the three pages end-to-end; the mutating actions (invite, role change, removal — CENTRAL.3) stay pending the org/member/role admin REST API tracked under central-node.RBAC-SVR.1. The members page surfaces an inline 'Read-only in v1 — admin REST API pending central-node.RBAC-SVR.1' notice so operators know what's missing. internal/web/orgs.go owns OrgSummary + MembershipRow + RoleCatalogRow + OrgsProjection (LookupOrg + ListMembers; mutations deliberately absent). Three new templates: org_overview.tmpl (header card + quick-action navigation), org_members.tmpl (membership table + pending-API notice), org_roles.tmpl (built-in role catalog from internal/core/rbac). Central web shell mounts GET /orgs/{org}, /orgs/{org}/members, /orgs/{org}/roles; all three set CentralOnly so the shared base layout renders the CENTRAL ONLY banner (CENTRAL.2). PostgresStore grew two thin read methods: LookupOrgByID + ListMembersForOrg; cmd/rex-central provides a postgresOrgsAdapter that satisfies OrgsProjection (lives in cmd/ so internal/central/web stays free of internal/central/server). The adapter only wires when --db Postgres is enabled — MemoryStore deployments respond 503 on overview + members (no org data) but /roles still renders because it reads the built-in catalog. v1 single-workspace + admin-REST-pending limitations carried in the page copy and in this note."
    references: [CENTRAL.1, CENTRAL.3]
    proof:
      - kind: code
        path: internal/web/orgs.go
      - kind: code
        path: internal/web/templates/pages/org_overview.tmpl
      - kind: code
        path: internal/web/templates/pages/org_members.tmpl
      - kind: code
        path: internal/web/templates/pages/org_roles.tmpl
      - kind: code
        path: internal/central/web/orgs.go
      - kind: code
        path: internal/central/server/orgs.go
      - kind: code
        path: cmd/rex-central/orgs_adapter.go
      - kind: test
        path: internal/central/web/orgs_test.go

  - id: central-placeholder-surfaces
    description: "Ship shell-only /orgs/<id>/idp and /orgs/<id>/encryption-keys pages that explain the feature is deferred and link to the tracking spec/issue. No mutation controls. Add the 'CENTRAL ONLY' banner per CENTRAL.2"
    state: done
    note: "base.tmpl gained a CENTRAL ONLY banner that renders above {{block content}} when .CentralOnly is true (web-ui.CENTRAL.2). Both shells' page-data envelopes added the field — local always false; central sets true on org-scoped admin surfaces. A new placeholder_central.tmpl renders the deferred-feature copy + tracking hint. /orgs/{org}/idp explains the SSO/IdP bridging deferral with a pointer to central-node.IDP-CENTRAL.1-note; /orgs/{org}/encryption-keys explains the v1.5 deferral of per-tenant transcript encryption with a pointer to storage.encryption-opt-in + web-ui.CENTRAL.4. Both routes mount on the central web shell at GET /orgs/{org}/idp + GET /orgs/{org}/encryption-keys; no resolver dependency (the org id is the only input). Tests cover both pages' banner + copy + tracking hint, plus a negative test that the banner does not leak into workspace-scoped pages."
    references: [CENTRAL.1, CENTRAL.2, CENTRAL.4]
    proof:
      - kind: code
        path: internal/web/templates/base.tmpl
      - kind: code
        path: internal/web/templates/pages/placeholder_central.tmpl
      - kind: code
        path: internal/central/web/placeholders.go
      - kind: test
        path: internal/central/web/placeholders_test.go

  - id: live-run-watching
    description: "Implement the live-run-watching SSE endpoint and the corresponding HTML view that streams transcript and permission prompts"
    state: done
    references: [LIVE.1, LIVE.2, LIVE.3]
    proof:
      - kind: code
        path: internal/local/web/frame_view.go
      - kind: code
        path: internal/web/static/htmx-ext-sse.js

  - id: search-ui
    description: "Implement the search UI with the scope picker (current workspace / all local / specific remote) and saved searches"
    state: done
    note: "FTS5-backed `/search` page already shipped as part of `local-ui-routes`; this task adds the scope picker (SEARCH.1), the saved-searches sidebar (SEARCH.3), and a 'save current search' POST form. The shared scope_picker partial from shared-component-lib lives in the topbar AND on the inline search form, with `?scope=` round-tripping through the URL so saved entries are shareable. The cross-remote DISPATCH (actually running a query against a remote's index) is search-engine territory — `?scope=remote:foo` and `?scope=*` are accepted on the wire and reflected in the form, but the v1 query path only hits the local FTS index. SEARCH.2 (BM25 snippet highlighting + click-to-open) was already in place via markupSnippet's <<term>> → <mark> conversion. Saved searches read the merged per-workspace + per-user registry from internal/local/savedsearch (the same registry the CLI's `rex search saved` subcommands write); workspace entries shadow user entries on name collision."
    references: [SEARCH.1, SEARCH.2, SEARCH.3]
    proof:
      - kind: code
        path: internal/local/web/search.go
      - kind: code
        path: internal/web/templates/pages/search.tmpl
      - kind: test
        path: internal/local/web/search_ui_test.go

components:

  STACK:
    name: Technology stack
    requirements:
      "1": "Server-rendered HTML produced by Go's `html/template` (or a thin wrapper); no SPA framework"
      "2": "htmx for partial swaps and form interactions; `hx-ext=\"sse\"` for live-streaming run transcripts and run status changes"
      "3": "CSS is hand-written and lives alongside the templates; no preprocessor; targets evergreen browsers only"
      "4": "Both UIs share a small JS layer for keyboard shortcuts, copy-to-clipboard, and the timer-based draft-indicator refresh"

  SHARED:
    name: Shared components
    requirements:
      "1": "A set of shared partial templates is used by both local and central UIs: workspace card, spec table row, run table row, audit log row, ACID badge (click-to-copy), draft indicator, scope picker"
      "2": "Templates render identically in both UIs unless they explicitly opt into central-only or local-only branches"

  LOCAL:
    name: Local UI route set
    requirements:
      "1": "Routes (v1, single-workspace binding per LOCAL.1.1): `/`, `/specs`, `/specs/<spec-id>`, `/amendments`, `/amendments/<stem>`, `/runs`, `/runs/<run-id>` (live), `/audit`, `/remotes`, `/settings`. The workspace-id-prefixed variants (`/workspaces/<id>/...`) are reserved for the post-v1 multi-workspace daemon shape."
      "1.1": |
        `rex serve` in v1 binds one process to exactly one workspace
        — the workspace at cwd, or the --workspace flag's target.
        Routes therefore omit a workspace-id segment: there is only
        ever one value to put there. The /workspaces/<id>/...
        shape is reserved for the post-v1 multi-workspace daemon
        (the same daemon model that unblocks `rex run --detach`,
        the in-process push bus mentioned in LIVE.1-note, and the
        multi-workspace `rex serve` listening on a long-lived
        socket).

        Central UI keeps its full route set (CENTRAL.1) — central
        nodes are inherently multi-org / multi-workspace.
      "2": "Authentication is local-machine: the binary listens on localhost only by default, and the user is implicitly the owner of the machine identity; remote-network exposure requires opt-in config"
      "3": "Workspace overview page shows: workspace state, draft counts, recent runs, attached remotes, quick-action buttons (start run, validate specs, sync now)"
      "4": "Spec detail view has tabs: rendered (markdown), YAML source, tasks, history; ACID badges are click-to-copy"
      "4.1": "Spec detail view (`/specs/<spec-id>`) gains a 'Proposed amendments' panel listing amendments whose `amendment_for` matches this spec, plus a link to `/amendments?for=<spec-id>` for the full filtered list. An empty `_proposed/` directory yields an empty (but still rendered) panel rather than a 500"
      "5": "Run detail view streams transcript live via SSE during an active run; supports inline approve/deny for permission prompts"
      "6": "Settings is a single-page form covering identity selection, default remote, log levels, hook search paths"
      "7": "`/amendments` lists proposed and accepted amendments under `.rex/specs/_proposed/`. Filterable by state and by target spec id (`?state=proposed|accepted`, `?for=<spec-id>`). Each row links to the detail view"
      "7.1": "`/amendments/<file-stem>` renders the amendment's frontmatter (target spec, date, state, summary) plus the YAML body, with click-to-copy on the file path. Includes accept/reject buttons when state is `proposed`; both POST to a sibling endpoint (`/amendments/<stem>/accept`, `/amendments/<stem>/reject`). Buttons are absent when state is `accepted`. Accept/reject rely on the loopback-only default for trust per `LOCAL.2`"

  CENTRAL:
    name: Central UI additional surfaces
    requirements:
      "1": |
        Routes on central are org-scoped. The org section is:
        `/orgs/<org-id>` (overview), `/orgs/<org-id>/members`,
        `/orgs/<org-id>/roles`, `/orgs/<org-id>/idp` (shell-only
        placeholder pre-IdP-shipping; see central-node.IDP-CENTRAL.1-note),
        `/orgs/<org-id>/encryption-keys` (shell-only placeholder
        pre-encryption-shipping; see CENTRAL.4 and
        storage.encryption-opt-in). The workspace-scoped subset
        mirrors the local UI under
        `/orgs/<org-id>/workspaces/<ws-id>/...`: `/specs`,
        `/specs/<spec-id>`, `/amendments`, `/amendments/<stem>`,
        `/runs`, `/runs/<run-id>`, `/audit`, `/remotes`,
        `/settings`, plus `/orgs/<org-id>/workspaces` for the
        per-org workspace index. `/search` is org-scoped via the
        session (the picker can scope further per SEARCH.1). `/`
        redirects to `/orgs/<id>` for single-org users and to an
        org picker for multi-org users (matches central-node.
        TENANT.2 — never picks for the user).

        Per-route semantics on central differ from local where
        the underlying model differs:

        - `/remotes` renders the workspace's *synced* remotes
          registry (`.rex/remotes.toml` from the GitStore, per
          storage.WS.2.7). Read-only on central; per-machine
          remote management remains the local shell's surface.
        - `/settings` renders `workspace.yaml` (the
          workspace-level synced settings). Per-machine config
          (identity selection, log levels, hook search paths)
          is local-only and is omitted on central rather than
          shown empty or 404'd.
        - `/runs/<run-id>` renders terminal-state runs from the
          replayed event store. Live SSE and inline permission
          prompts are deferred to `central-live-run-watching`,
          which is gated on a push-style channel for in-flight
          events (see the 2026-05-16 amendment, Decision B).
          Non-terminal runs render with a "live tail not
          available on central in v1" notice.
      "2": "Org-scoped pages show a 'CENTRAL ONLY' banner indicator on shared layout headers when accessed in a context that has them gated; this gate is also reflected in the local UI's nav (those routes don't exist locally)"
      "3": "Members view supports invite issuance, role changes, and removal; every action runs through RBAC and writes audit entries"
      "4": |
        Encryption keys view is the surface for opt-in per-tenant
        transcript encryption (storage.yaml ENC.2). v1 ships a
        shell-only placeholder page that explains the feature is
        deferred to v1.5 (per storage.encryption-opt-in) and links
        to the upstream tracking issue/spec; the page must not
        expose any key-management controls before the
        encryption-keys data model exists.

  CENTRAL-AUTH:
    name: Central UI browser authentication
    requirements:
      "1": |
        Browser sessions on central are bound by an HttpOnly,
        Secure, SameSite=Strict cookie (`rex_session`) holding a
        bearer token minted via the existing `/auth/challenge` +
        `/auth/verify` flow (identity-and-trust.TOKEN.*). The
        cookie's TTL matches the token's TTL.
      "2": |
        Login flow: `/login` renders a one-time challenge string
        and instructs the user to redeem it via `rex remote login
        <central-url> --challenge <s>` from a terminal holding the
        private key. The CLI either opens the browser to
        `/auth/redeem?token=<...>` (desktop default) or prints a
        paste-in URL (headless/SSH fallback). `/auth/redeem` sets
        the cookie and redirects to the original target URL.
      "3": |
        Web requests authenticate via either the `rex_session`
        cookie OR an `Authorization: Bearer …` header (API consumer
        parity). The cookie path goes through the same auth
        middleware as the API path; no separate web-only credential
        surface exists.
      "4": |
        Logout clears the cookie and calls `/auth/revoke` against
        the central node. Token revocation is authoritative — a
        stolen cookie cannot outlive the revocation.
      "5": |
        The central UI never embeds, stores, or transmits the
        user's private key in browser-accessible form. The CLI
        holds the key and signs the challenge; the browser only
        ever sees the resulting bearer token wrapped in an
        HttpOnly cookie.

  CENTRAL-LAYOUT:
    name: Central + local web package layout
    requirements:
      "1": |
        Shared web code (templates, partials, static assets, render
        helpers, reusable handlers for read-side pages — specs,
        runs, audit, search, amendments) lives at `internal/web/`.
        Both `cmd/rex` and `cmd/rex-central` import it via thin
        shell packages (`internal/local/web/` for the local
        binding, `internal/central/web/` for the central binding).
      "2": |
        Shared handlers take a `WorkspaceResolver` interface that
        maps a workspace id to its content (file paths for the
        local shell, Postgres-backed projections for the central
        shell). Templates render identically in both UIs
        (SHARED.2); the resolver is the only injection point that
        differs.
      "3": |
        Single-workspace routes on the local shell continue to omit
        the workspace-id segment per LOCAL.1.1. The shared handlers
        do not assume an implicit workspace; local routes resolve
        the implicit binding before delegating to the shared
        handler.

  LIVE:
    name: Live run watching
    requirements:
      "1": "An SSE endpoint at `/runs/<run-id>/stream` emits run events as they happen; events include node lifecycle, transcript chunks, and permission prompts. (The workspace-id-prefixed shape is reserved for post-v1 per LOCAL.1.1.)"
      "1-note": "v1 mechanism: file-tail polling of .rex/events.log at ~100ms cadence. The SSE handler replays the prior events for the run on connect (filtered by run_id), then polls past EOF for new records. Push-style notification (one writer broadcasting over an in-process bus) is deferred until a daemon model exists; v1 ships rex serve and rex run start as separate processes with no shared bus. Latency on localhost stays within PERF.1."
      "2": "The run detail page subscribes via `hx-ext=\"sse\"` and renders incoming chunks; the page works correctly when first opened mid-run (all prior events are replayed before new ones)"
      "3": "Permission prompts render as inline cards with approve/deny buttons; click triggers a POST to `/runs/<run-id>/permission` that resolves the prompt. (Workspace-id-prefixed shape reserved for post-v1 per LOCAL.1.1.)"

  SEARCH:
    name: Search UI
    requirements:
      "1": "A search input with a scope picker is present in the global header; the picker offers: current workspace, all local workspaces, each attached remote, all remotes"
      "2": "Result presentation uses BM25-flavored snippet highlighting; clicking a result opens the underlying entity (spec, run, audit entry)"
      "3": "Saved searches appear in a sidebar; one click runs them and updates the URL so the result is shareable"

  DRAFT-VIZ:
    name: Draft-vs-committed visualization
    requirements:
      "1": "Every page that shows entities subject to sync displays a draft-vs-committed indicator; for workspaces with multiple remotes, separate indicators per remote"
      "2": "The workspace overview shows a richer affordance — a strip showing local timeline, central timeline, and the rebase relationship between them"
      "2-note": "The exact richer-affordance design is flagged as an open question in the gap report; the v1 implementation may ship as a Git-log-flavored ASCII strip with the design left as room to iterate"

constraints:

  PERF:
    description: Web UI performance invariants
    requirements:
      "1": "Server-rendered page time-to-first-byte is under 100ms for cached templates against local-only data"
      "2": "SSE reconnection on transient network failure is automatic; the page never silently freezes when the connection drops"
      "3": "No JS bundle exceeds 50KB minified (htmx + the small custom layer)"

  ACCESS:
    description: Accessibility and compatibility invariants
    requirements:
      "1": "All interactive elements are keyboard-navigable; focus order matches visual order"
      "2": "Color is not the sole carrier of information for state indicators; icons or text labels accompany color"
      "3": "The UI degrades gracefully on JS-disabled browsers — read paths fully work, write paths show a clear notice"

  SCOPE-CUT:
    description: V1 web UI non-goals
    requirements:
      "1": "No central-side execution UI in v1 (matches `execution.yaml` EXEC-SCOPE)"
      "2": "No scheduled-jobs management view in v1 — schedule files are edited via CLI/text editor"
      "3": "No plugin management UI in v1"
      "4": "No web UI for hook management in v1; `rex hooks list` is the only surface"
      "5": "No per-tool/per-time-window RBAC scoping UI in v1; the data model supports it but the UI ships in a later milestone"

extra:
  notes: |
    The "permission prompt while no user is watching" UX (run continues
    paused, eventual timeout) is owned by execution.yaml PERM.3 — the web
    UI just renders the resulting state.
