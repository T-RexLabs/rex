spec_version: 1

metadata:
  id: central-node
  name: Central node deployment
  state: draft
  created_at: 2026-05-03T00:00:00Z
  updated_at: 2026-05-04T00:00:00Z

description: |
  A central node is the same Go binary as the local node, plus a Postgres
  adapter and a multi-tenant routing layer. It is deployed via Docker
  Compose: one binary container, one Postgres container, optionally a
  reverse proxy in front for TLS termination. No mandatory external
  services beyond Postgres.

  Central nodes are multi-tenant from day one: many orgs share one
  deployment. Each org is a tenancy boundary — its workspaces, members,
  RBAC, encryption keys, and audit log are scoped to it. Orgs do not see
  each other's data.

  Central-to-central federation does not exist in v1; central nodes are
  isolated islands and the local node is the only thing that fans out
  across them.

tasks:
  - id: docker-compose-base
    description: "Author the v1 docker-compose.yml with the binary container, Postgres container, and configuration via env vars + mounted config file"
    state: done
    references: [DEPLOY.1, DEPLOY.2, DEPLOY.3]

  - id: postgres-schema
    description: "Author the Postgres schema (mirroring the local SQLite schema where applicable, plus multi-tenancy scoping columns)"
    state: done
    note: "Single-tenant subset shipped; the org_id columns + Row Level Security policies named in DB.2 land with the tenant-routing task."
    references: [DB.1, DB.2, DB.3]

  - id: tenant-routing
    description: "Implement the tenant-routing middleware that scopes every request to an org based on the authenticated identity's membership and the workspace->org table; add the workspaces table, the org_id column on events, and the migration backfill via the default org seed. Defense-in-depth Row Level Security policies land separately under tenant-rls."
    state: done
    references: [TENANT.1, TENANT.2, TENANT.3]

  - id: tenant-rls
    description: "Add Postgres Row Level Security policies on the multi-tenant tables (events, workspaces) and refactor PostgresStore methods to set app.current_org_id per transaction; defense-in-depth on top of the middleware-level scoping that ships with tenant-routing"
    state: done
    note: "Shipped with ENABLE without FORCE: the rex app role is the table owner so app reads bypass RLS (the application-layer WHERE clauses + middleware are the primary scoping). Non-owner Postgres readers (future read-only audit role) are subject to the policies. FORCE was considered but breaks the middleware's cross-org workspace-binding lookup."
    references: [DB.2]

  - id: admin-bootstrap
    description: "Implement the first-run admin bootstrap flow (initial org, initial admin identity)"
    state: done
    references: [BOOT.1, BOOT.2]

  - id: backups-and-restore
    description: "Implement scheduled Postgres dumps and a `rex-central restore` flow"
    state: done
    references: [BACKUP.1, BACKUP.2, BACKUP.3]

  - id: health-endpoints
    description: "Implement /health, /ready, and /metrics (Prometheus format) plus the org-independent metric subset"
    state: done
    references: [HEALTH.1, HEALTH.2]

  - id: structured-logging
    description: "Migrate the central-node binary to structured JSON logs on stdout; one log line per significant operation; redact secrets at the logger boundary"
    state: done
    references: [HEALTH.3]

components:

  DEPLOY:
    name: Docker Compose deployment
    requirements:
      "1": "v1 ships an official `docker-compose.yml` with three services: `rex-central` (the binary), `postgres` (data store), `caddy` (TLS reverse proxy, optional)"
      "2": "Configuration is via environment variables + a mounted `central.toml` config file at `/etc/rex/central.toml`; the config file holds non-secret defaults, env vars hold secrets and per-deployment overrides"
      "3": "The compose file uses named volumes for Postgres data and the central node's binary state (snapshots, hook logs); single-command setup via `docker compose up -d`"
      "4": "A `docker-compose.dev.yml` overrides the base file for local development with hot-reload-friendly settings"
      "5": "Single-binary deployment without Docker is also supported via `rex-central serve` for users who prefer to run on bare metal"

  DB:
    name: Postgres schema
    requirements:
      "1": "The Postgres schema mirrors the local SQLite schema field-for-field for the entities that exist in both; central-only entities (orgs, memberships, invites, central RBAC tables) extend the schema"
      "2": "Every row in every multi-tenant table carries an `org_id` column; queries are scoped by `org_id` via the tenant-routing middleware before reaching the database, enforced by row-level security policies as a defense-in-depth"
      "3": "The audit log uses a Postgres role with INSERT and SELECT only — no UPDATE, no DELETE — providing the structural append-only enforcement"
      "4": "Postgres FTS (built-in) handles the search index; the schema mirrors the SQLite FTS5 schema where dialect allows"

  TENANT:
    name: Multi-tenancy
    requirements:
      "1": "Every API request resolves to exactly one org based on the authenticated identity's membership and either an explicit `X-Rex-Org` header or the workspace ID in the request path"
      "1-note": "For request paths that don't contain a workspace id (every /sync/* endpoint), the middleware resolves the org from the authenticated identity's membership. Single-org identities get their org inferred; multi-org identities MUST include an X-Rex-Org header — the API rejects ambiguous requests with 400 rather than picking (TENANT.2). Workspace-prefixed routes (/workspaces/<id>/...) resolve via the workspaces table; the resolved org is then cross-checked against the identity's memberships."
      "2": "If an identity is a member of multiple orgs, the chosen org must be made explicit; the API never picks for the user"
      "3": "Cross-org operations are forbidden at the API layer; an admin in org A cannot read or write data in org B even if they hold an admin role in both, except by switching contexts"
      "4": "The tenant-routing middleware writes the resolved org ID into the request context once; downstream handlers read from the context, not from headers"
      "4-note": "v1 backwards-compat: a 'default' org is seeded on the first multi-tenant migration. Existing single-tenant deployments (events from PostgresStore v1, schema_version 1) get every previously-authenticated identity auto-joined to that org and every event row backfilled to it before the NOT NULL constraint on org_id lands. Fresh deployments still get the default org so the system has a sane home for events before BOOT.* ships real org creation. The default org is NOT special-cased after bootstrap — it's a regular org subject to the same RBAC and tenancy boundaries."

  BOOT:
    name: First-run bootstrap
    requirements:
      "1": "On first start with an empty database, the central node enters bootstrap mode: it generates a single one-time admin claim token printed to logs and persisted in the host filesystem at a known path"
      "2": "The first user to redeem the token (via `rex remote add` flow with the bootstrap URL) becomes the founder admin; their public key is registered, the token is invalidated, and bootstrap mode exits"
      "3": "Subsequent users join via invite from an existing admin; there is no other path to membership"

  RBAC-SVR:
    name: Server-side RBAC enforcement
    requirements:
      "1": "Every authenticated request is checked against the org's RBAC rules before any data access; the check covers the action, the target resource type, the target resource ID, and the request context"
      "2": "RBAC denials return 403 with a non-leaking error message (no information about which resource exists or what action would have been allowed)"
      "3": "RBAC rule changes are audited and take effect on the next request; existing in-flight requests complete under the prior rules"

  BACKUP:
    name: Backups and restore
    requirements:
      "1": "Central nodes run a scheduled `pg_dump` to a configured backup target (default: a host-mounted directory; pluggable to S3-compatible object stores) at a configurable cadence (default daily)"
      "2": "Backups capture only Postgres data; transcript files on the binary's volume are backed up separately by the operator's standard tooling"
      "3": "Restoration is documented as `docker compose down` + restore Postgres + `docker compose up`; `rex-central` supports a `restore --from <backup-path>` mode that validates the dump before applying"

  HEALTH:
    name: Health and observability
    requirements:
      "1": "The central node exposes `/health` (liveness), `/ready` (database reachable + migrations applied), and `/metrics` (Prometheus format) endpoints"
      "2": "Metrics include sync-events-per-second, active-sessions, RBAC-deny-rate, audit-write-rate, and per-org row counts"
      "2-note": "RBAC-deny-rate and per-org row counts depend on TENANT.* (multi-tenancy + RBAC server-side) landing first. v1's health-endpoints task ships the org-independent subset (sync-events-per-second, active-sessions, audit-write-rate); the org-scoped metrics ship alongside tenant-routing and cross-reference HEALTH.2 from there. The full surface named in HEALTH.2 remains the v1 contract; this note documents the implementation order."
      "3": "Structured JSON logs are written to stdout; one log line per significant operation; no logs contain secrets"

  IDP-CENTRAL:
    name: SSO/IdP bridging (deferred, but data model is here)
    requirements:
      "1": "The org table includes optional `idp_config` and `scim_config` fields; v1 ships these as null for every org and the bridging code paths are unimplemented"
      "1-note": "When SSO ships post-v1, this is the attachment point — flagged as an open decision in the gap report"

constraints:

  ENG:
    description: Central-node engineering invariants
    requirements:
      "1": "The central node binary must remain the same Go module as the local-node binary; a build flag selects which surfaces are compiled in"
      "2": "The Postgres schema is migrated by the same in-binary migrator as the local SQLite schema; the migrator branches on driver type"
      "3": "No additional runtime services beyond Postgres are required for v1 — no message queue, no cache, no separate worker fleet"

  SEC:
    description: Central-node security invariants
    requirements:
      "1": "All inbound HTTP is HTTPS; HTTP is supported only via reverse proxy doing TLS termination; the binary never accepts plaintext from the internet"
      "2": "Database connections use TLS where the deployment supports it; in Docker Compose default, Postgres and the central binary share a private network"
      "3": "Per-tenant transcript encryption (when enabled, see `storage.yaml`) uses keys held in a separate keys table with restricted access; key material is never logged"

extra:
  owners: []
  related_specs: [overview, identity-and-trust, sync, audit, storage, search, web-ui]
  notes: |
    Central-side execution (running harnesses on the central node, not just
    storing) is deferred to v1.5. The data model already records where each
    run executed; the central UI surfaces and credential model are the
    deferred work.
