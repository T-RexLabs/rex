  notes: |
    The name Rex was chosen for QWERTY-left-hand typeability and a clean
    three-letter CLI. There is a namespace collision with the Perl-based
    Rex DevOps framework (rexify.org); not blocking but worth a domain
    and GitHub org grab before any public announcement.
