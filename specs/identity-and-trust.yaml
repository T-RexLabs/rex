spec_version: 1

metadata:
  id: identity-and-trust
  name: Identity, trust, and access control
  state: draft
  owners: []
  related_specs: [overview, sync, central-node, audit]
  created_at: 2026-05-03T00:00:00Z
  updated_at: 2026-05-17T00:00:00Z

description: |
  Identity in Rex follows the Git/SSH spirit: each user has a portable
  ed25519 keypair plus a human-readable handle. The keypair is the proof
  of identity; the handle is for humans. Trust is per-remote — a remote
  that doesn't recognize your public key won't talk to you.

  Locally there are no organizations. Orgs only exist in the context
  of a central node you've connected to, and a single human may belong
  to multiple unrelated orgs across different central nodes.

  RBAC is fine-grained from v1, including per-harness scoping, but ships
  with sensible role defaults so creating a workspace is one click rather
  than a permissions wizard.

tasks:
  - id: keypair-generation
    description: Implement keypair generation, storage, and the abstract Signer interface (so passkeys/WebAuthn can be added later)
    state: done
    references: [KEY.1, KEY.2, KEY.3]
    proof:
      - kind: code
        path: internal/core/identity/

  - id: handshake-protocol
    description: Implement the challenge-response handshake between local and central
    state: done
    references: [AUTH.1, AUTH.2, AUTH.3]
    proof:
      - kind: code
        path: rex-centralized/central/server/auth.go
      - kind: test
        path: rex-centralized/central/server/auth_test.go

  - id: token-lifecycle
    description: Implement short-lived access tokens, refresh tokens, and the server-side revocation list
    state: done
    note: "internal/central/server/auth.go now stores tokens by SHA-256 hash (TOKEN.2) — wire values never sit in memory after issuance returns. /auth/verify mints an (access, refresh) pair under a fresh chain id (TOKEN.1: 15min access, 30d refresh defaults). POST /auth/refresh exchanges the refresh for a new pair, invalidating the presented refresh on success (TOKEN.3 rotation). Reuse of a rotated refresh trips SEC.2's chain-revoke path: every token in the chain flips to revoked and audit emits auth.replay_attempt + token.revoked. POST /auth/revoke supports both single-token and entire-chain revocation; revocations land in an explicit list checked on every resolveAccessToken call (TOKEN.4). Audit emission (TOKEN.5) covers auth.success, auth.failure, token.issued, token.refreshed, token.revoked, auth.replay_attempt — wired via the new AuthAuditAppender option on Server. The dev-mode MemoryStore + nil appender path drops events silently; production --db Postgres deployments wire an eventlog-backed appender. Client-side auto-refresh on 401 is a follow-up; the existing handshake-on-401 path still works correctly, just slower than refresh."
    references: [TOKEN.1, TOKEN.2, TOKEN.3, TOKEN.4]
    proof:
      - kind: code
        path: rex-centralized/central/server/auth.go
      - kind: code
        path: rex-centralized/central/server/server.go
      - kind: code
        path: internal/core/sync/proto/types.go
      - kind: test
        path: rex-centralized/central/server/auth_token_test.go

  - id: rbac-engine
    description: Implement the RBAC engine with role defaults and fine-grained scoping
    state: done
    note: "internal/core/rbac is the pure-Go policy engine: a closed `<resource-type>.<action>` permission catalog (RBAC.3), three default roles admin/member/viewer with predefined permission sets (RBAC.2), Constraint-based fine-grained scoping for workspace/harness/tool/time-window narrowing (RBAC.4 + RBAC.4.1 + RBAC.4.2), and an `Allow(req, grants)` function that returns a typed Decision (RBAC.1). On the server side, PostgresStore implements RoleResolver via the existing org_memberships.role column; Server.requirePermission threads (orgID, fingerprint) through the resolver, builds a Grant, and gates the four sync endpoints — sync.push for POST /sync/events, sync.pull for GET /sync/events, git.push for POST /sync/git, git.pull for GET /sync/git/{entity}. MemoryStore (dev/test) has no resolver so the gate passes through, matching the keystore-empty signature-verification bypass. RBAC.6 (audit emission for grant/revoke changes) and a custom-grant admin surface are deferred until central-ui-routes ships — there is no API to create non-default grants in v1."
    references: [RBAC.1, RBAC.2, RBAC.3, RBAC.4]
    proof:
      - kind: code
        path: internal/core/rbac/rbac.go
      - kind: test
        path: internal/core/rbac/rbac_test.go
      - kind: code
        path: rex-centralized/central/server/rbac.go
      - kind: code
        path: rex-centralized/central/server/orgs.go
      - kind: test
        path: rex-centralized/central/server/rbac_test.go

  - id: org-model-central
    description: "Implement orgs, org_memberships, and org_invites as central-only entities; seed a default org on first multi-tenant migration so existing single-tenant deployments keep working until BOOT.* ships real org creation"
    state: done
    references: [ORG.1, ORG.2, ORG.3, ORG.4]
    proof:
      - kind: code
        path: rex-centralized/central/server/orgs.go
      - kind: test
        path: rex-centralized/central/server/orgs_test.go

  - id: invite-redeem-flow
    description: |
      Wire the recipient half of ORG.5: POST /invites/redeem (no auth gate — the
      invite token is the credential) accepts {token, handle, public_key_pem},
      validates the invite is unexpired + unredeemed, registers the public key
      in the Postgres authorized_keys table + in-memory Keystore, inserts the
      org_memberships row with the invite's role, marks the invite redeemed,
      and emits both identity.key_registered (if first-time) and org.member.joined.
      A browser surface at GET /invites/<token> renders a paste-your-public-key
      form that POSTs to the same endpoint.
    state: done
    references: [AUTH.2, "AUTH.2.1", "AUTH.2.2", ORG.5, SEC.1]
    note: "Shipped 2026-05-17 against the same-day invite-redeem amendment. Schema step 8 adds authorized_keys (no org scope; keys are user-global per AUTH.2.2). PostgresStore grows PeekInvite / RedeemInvite / RegisterAuthorizedKey / ListAuthorizedKeys; LoadAuthorizedKeysIntoKeystore overlays DB rows onto the TOML-loaded keystore at startup. cmd/rex-central's postgresInviteRedeemer adapter wraps the storage txn with in-memory keystore overlay (so a freshly-redeemed key authenticates immediately without restart) + audit emission (identity.key_registered when KeyRegistered, org.member.joined when MemberJoined). Web handlers GET /invites/<token> + POST /invites/redeem live in internal/central/web/invites.go and are listed in isPublicWebPath (the invite token IS the credential — the session gate would loop). Coverage: 11 storage tests under PG + 7 web handler tests."
    proof:
      - kind: code
        path: rex-centralized/central/server/orgs.go
      - kind: code
        path: rex-centralized/central/server/authorized_keys.go
      - kind: code
        path: rex-centralized/central/server/store_postgres.go
      - kind: code
        path: rex-centralized/central/web/invites.go
      - kind: code
        path: rex-centralized/cmd/rex-central/redeem_adapter.go
      - kind: test
        path: rex-centralized/central/server/orgs_mutate_test.go
      - kind: test
        path: rex-centralized/central/server/authorized_keys_test.go
      - kind: test
        path: rex-centralized/central/web/invites_test.go

components:

  KEY:
    name: Keypair and signing
    requirements:
      "1": Identity is an ed25519 keypair plus a human-readable handle (e.g. `alice`); both are persisted under `~/.config/rex/identity/`
      "2": The signing operation is exposed via an abstract Signer interface; the file-on-disk implementation is one of potentially several backends
      "2.1": v1 ships only the file-on-disk Signer; the interface leaves room for passkey/WebAuthn/HSM-backed signers without changing the auth handshake
      "3": Multiple identities per machine are supported; the active identity is selected via `~/.config/rex/config.toml` and overridable per-command via `--identity`
      "4": Public-key fingerprints (SHA-256 of the public key, hex-encoded, 16-char prefix) are the canonical short reference for an identity in CLI output and audit logs
      "5": Private keys are never transmitted, never logged, and never written outside `~/.config/rex/identity/`

  AUTH:
    name: Cross-node authentication handshake
    requirements:
      "1": A local node authenticates to a central node by signing a server-issued nonce with its ed25519 private key; the central node verifies against the registered public key
      "1.1": The challenge is a random 32-byte value with a server-issued ID and an expiry of 60 seconds
      "1.2": The signed payload includes the challenge bytes, the central node's hostname, and the requested scope; this binds the signature to a specific server and prevents cross-server replay
      "2": Public keys are registered with a central node out-of-band — the user pastes a key (or `rex remote add` does it) and the central admin (or invite flow) approves
      "2.1": "Invite-redeem is the second registration path: a recipient with a valid unredeemed unexpired invite token submits their public key alongside the token in a single request; the central node registers the key, stamps the `org_memberships` row with the invite's role, and marks the invite redeemed. The invite (issued by an admin with `org.admin` permission) is the explicit approval required by SEC.1 — no further admin action is needed at redeem time."
      "2.2": "Runtime-registered keys (currently only invite-redeem; future paths join via the same surface) are persisted in a central-side Postgres table (`authorized_keys`, scoped to no org — keys are user-global within a central node; org membership is the per-org filter). The TOML `--keys` file remains the bootstrap mechanism for the first admin key and the dev-mode (`--db` unset) fallback. On startup, both sources load into the same in-memory Keystore; DB entries take precedence on fingerprint conflict."
      "3": 'The handshake fails closed: any signature failure, expired nonce, or unregistered key returns 401 with no other information'
      "4": Every successful authentication writes an `auth.success` audit event; every failed attempt writes an `auth.failure` event
      "5": No password-based authentication path exists in the codebase

  TOKEN:
    name: Token lifecycle
    requirements:
      "1": Successful authentication issues a short-lived access token (15 minute default) and a longer-lived refresh token (30 day default)
      "2": Tokens are opaque random strings; the central node stores hashes, not the tokens themselves
      "3": Refresh exchanges a refresh token for a new access token + new refresh token; the old refresh token is invalidated (rotation)
      "4": A central node maintains a revocation list of token IDs; revocations are checked on every access token use; revocations propagate immediately within a single central node
      "5": Token expiry, revocation, and refresh-rotation events are all written to the audit log

  ORG:
    name: Organizations (central-only)
    requirements:
      "1": Organizations are a first-class entity on central nodes only; the local instance has no concept of orgs
      "2": An organization is a named tenancy boundary — its workspaces, members, RBAC rules, encryption keys, and audit log are scoped to it
      "3": A central node may host many orgs (multi-tenant); orgs do not see each other's data
      "4": A user (identified by public key fingerprint) may be a member of multiple orgs on the same central node, with different roles in each
      "5": 'Org membership is granted via invite flow: an existing member with `org.admin` permission issues an invite link that the recipient redeems with their public key'
      "6": Workspaces on a central node are owned by exactly one org
      "6-note": "Workspaces are bound to an org via first-push-wins: when the central observes a workspace_id it has never indexed, it stamps the new workspaces row with the pushing identity's resolved org. Subsequent pushes for the same workspace_id must come from members of that org or are rejected with 403. Explicit `POST /workspaces` registration is reserved for a future task that needs it (e.g. a central-side CLI for ops); v1 ships first-push-wins as the single binding mechanism."

  RBAC:
    name: Role-based access control
    requirements:
      "1": The RBAC engine answers questions of the form "may identity I perform action A on resource R in org O at time T?"
      "2": 'V1 ships three default roles per org: `admin` (everything), `member` (can create workspaces, run harnesses, edit specs), `viewer` (read-only)'
      "3": Permissions are expressed as `<resource-type>.<action>` strings (e.g. `workspace.create`, `spec.edit`, `harness.invoke`)
      "4": 'Fine-grained scoping is supported: a permission grant may carry constraints on which workspaces, which harnesses, which tools, and a time window'
      "4.1": Time-window constraints are evaluated against the central node's clock
      "4.2": Harness scoping allows e.g. "may invoke claude-code but not codex in workspace X"
      "5": 'Local instances enforce a simplified policy: a workspace is either reachable to the active identity or not; finer-grained checks happen on the central node when work syncs'
      "6": Every RBAC change (role assigned, permission granted, scope modified) writes an audit event with before/after values

  IDP:
    name: SSO and IdP bridging (central-only, deferred surface)
    requirements:
      "1": V1 ships native key-based identity only; SAML, OIDC, and SCIM bridges are deferred but the data model leaves room for them
      "1-note": The deferred surfaces are flagged as open questions in the gap report — owners need to confirm SAML vs OIDC, and the IdP-pre-creates-user-vs-first-login policy
      "2": When IdP bridging ships, an external identity must always be paired with at least one ed25519 public key; the IdP provides the human-attribute layer, the keypair provides the cryptographic identity

constraints:

  SEC:
    description: Security invariants for identity and access
    requirements:
      "1": Public-key registration on a central node always requires an explicit approval step; auto-trust on first use is forbidden
      "1-note": "Explicit approval covers both out-of-band paste + admin-approves (the existing path) and invite-issued + recipient-redeems (the new path landed by `AUTH.2.1`/`AUTH.2.2`). The invite issuance audit event (`org.member.invited`) is the auditable approval record for the redeem path; nothing about SEC.1 changes — this note only points out that invite redemption is one of its compliant paths."
      "2": Token rotation must be enforced — reusing a refresh token after rotation revokes the entire token chain and writes a `auth.replay_attempt` audit event
      "3": Central nodes must rate-limit authentication attempts per source IP and per public key, with exponential backoff on repeated failures
      "4": All identity-related cryptographic operations use the platform's standard libraries (Go's `crypto/ed25519`, etc.); custom crypto is forbidden

extra:
  notes: |
    The "user belongs to multiple central nodes with different orgs" model
    means the local instance must track per-remote identity preferences.
    Default behavior: use the active machine identity; per-remote override
    available in `~/.config/rex/remotes.toml`.
