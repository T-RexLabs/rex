# Tools spec extension — Rex's built-in MCP server.
#
# Status: accepted.
# Folded: 2026-05-09 — tools.yaml gained INTROSPECT.* + the implement-rex-mcp-server task.
#
# The existing tools.MCP.* component covers user-registered
# external MCP servers (filesystem, git, GitHub, etc.). This
# amendment adds a new INTROSPECT component for Rex's own
# self-served MCP server: a stdio JSON-RPC service that exposes
# Rex objects (specs, runs, audit events) as tools the harness
# can call mid-session.
#
# Why a separate component: external MCP servers are
# user-registered with credentials and scoping; the Rex MCP
# server is auto-attached, has no credentials, and its
# permission model flows through the existing
# permission.requested event stack rather than per-server scope
# rules.
#
# What this amendment declares:
#
#   - INTROSPECT.1 — `rex mcp` is a stdio MCP server exposing
#     read-mostly Rex tools.
#
#   - INTROSPECT.2 — auto-attached to every harness session
#     Rex spawns; user opt-out via workspace setting.
#
#   - INTROSPECT.3 — tool surface for v1: rex.workspace.brief,
#     rex.spec.list, rex.spec.read, rex.spec.validate,
#     rex.spec.verify, rex.spec.runs, rex.events.recent.
#
#   - INTROSPECT.4 — mutating tools (rex.run.cite and any
#     future tool that mutates state) gate through the
#     existing permission.requested flow.

target: tools
amendment_kind: additive

changes:
  - kind: add-component
    component_id: INTROSPECT
    name: Rex's built-in MCP server
    rationale: |
      Harnesses Rex spawns need live access to Rex objects
      (specs, runs, audit events) without re-implementing the
      schema reader inside every adapter. The built-in server
      sits between the harness and Rex's internal API:
      JSON-RPC over stdio, conforming to MCP, auto-attached so
      the harness gets the tools without per-workspace
      registration.
    requirements:
      "1": |
        `rex mcp` is a stdio MCP server: spawned as a child
        process, speaks JSON-RPC NDJSON on stdio per the MCP
        protocol. The subcommand inherits the parent run's
        workspace root via `--workspace <path>` so the tools
        scope to the right workspace from launch.
      "2": |
        Auto-attached to every harness session Rex spawns by
        appending a `{name: "rex", command: ["rex", "mcp",
        "--workspace", <root>]}` entry to ACP `session/new`'s
        `mcpServers` parameter. Workspaces opt out via
        `extra.disable_rex_mcp: true` on workspace.yaml.
      "3": |
        v1 tool surface (read-mostly):

          rex.workspace.brief()         → fetch the same primer
                                          harnessbrief.Build emits
          rex.spec.list()               → enumerate workspace specs
          rex.spec.read(id)             → fetch a spec's YAML body
          rex.spec.validate(id?)        → run the validator
          rex.spec.verify(id?)          → exercise structured proof
          rex.spec.runs(id, task?)      → list runs that cite a spec
          rex.events.recent(type?, n?)  → tail audit-class events

        Tool calls are stateless from Rex's side; each call
        re-reads the workspace's current state. The list is
        deliberately conservative for v1 — extensions ship as
        additive INTROSPECT.* requirements once usage patterns
        emerge.
      "4": |
        Mutating tools (in v1 just `rex.run.cite` for adding
        spec citations to the active run) gate through the
        existing PermissionRequested/Granted/Denied event
        flow. The MCP server emits a permission.requested
        event before the mutation, blocks the tool call until
        the run's permission scope (read_only / workspace /
        unrestricted) auto-resolves it or a human approves
        via `rex run approve`. This piggy-backs on the
        execution.PERM.* permission stack rather than
        introducing a new authorization layer.

  - kind: add-task
    task_id: implement-rex-mcp-server
    description: |
      Ship the `rex mcp` subcommand and the introspection tool
      surface (INTROSPECT.1-4). Includes the JSON-RPC handler,
      tool dispatch, auto-attach in StartHarnessRun, and
      end-to-end tests against a fake harness that consumes
      the tool surface.
    state: in_progress
    references:
      - INTROSPECT.1
      - INTROSPECT.2
      - INTROSPECT.3
      - INTROSPECT.4
